<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY FOTO Inbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f0f14;--sidebar:#16161e;--chat-bg:#1a1a24;
    --accent:#ff6b9d;--accent2:#c084fc;--green:#22c55e;
    --text:#e8e8f0;--text2:#8888aa;
    --bubble-in:#252535;--bubble-out:#2d1f4e;--border:#2a2a3a;
  }
  body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

  #sidebar{width:280px;min-width:280px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column}
  #sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  #sidebar-header h1{font-size:15px;font-weight:600;color:var(--accent)}
  #sidebar-header p{font-size:11px;color:var(--text2);margin-top:2px}
  #status-dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;transition:.3s}
  #status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
  #conv-list{flex:1;overflow-y:auto;padding:8px}
  .conv-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:.15s}
  .conv-item:hover{background:#1f1f2e}
  .conv-item.active{background:#1e1830}
  .conv-avatar{width:44px;height:44px;border-radius:50%;background:var(--bubble-in);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid var(--border)}
  .conv-avatar img{width:100%;height:100%;object-fit:cover}
  .conv-info{flex:1;min-width:0}
  .conv-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv-preview{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .conv-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;border-radius:999px;padding:2px 7px;flex-shrink:0}
  #no-convs{text-align:center;color:var(--text2);font-size:13px;padding:40px 16px;line-height:1.8}

  #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #chat-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--sidebar)}
  #chat-header .avatar{width:38px;height:38px;border-radius:50%;background:var(--bubble-in);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
  #chat-header .avatar img{width:100%;height:100%;object-fit:cover}
  #chat-header .info{flex:1}
  #chat-header .name{font-size:14px;font-weight:600}
  #chat-header .uid{font-size:11px;color:var(--text2)}
  #btn-line-oa{background:#06c755;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;white-space:nowrap}
  #btn-line-oa:hover{background:#05a848}

  #chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .msg-row{display:flex;gap:8px;max-width:75%}
  .msg-row.customer{align-self:flex-start}
  .msg-row.admin{align-self:flex-end;flex-direction:row-reverse}
  .msg-bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
  .msg-row.customer .msg-bubble{background:var(--bubble-in);border-bottom-left-radius:4px}
  .msg-row.admin .msg-bubble{background:var(--bubble-out);border-bottom-right-radius:4px;color:#d8b4fe}
  .msg-time{font-size:10px;color:var(--text2);margin-top:4px}
  .msg-row.admin .msg-time{text-align:right}

  #draft-area{border-top:1px solid var(--border);background:var(--sidebar);padding:12px 14px}
  #draft-label{font-size:11px;color:var(--accent);margin-bottom:6px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
  #draft-tabs{display:flex;gap:6px}
  .tab-btn{padding:4px 12px;border-radius:20px;font-size:11px;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:.15s}
  .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  #draft-text{width:100%;background:var(--bubble-in);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-family:inherit;resize:none;line-height:1.5;min-height:70px;outline:none;margin-top:8px}
  #draft-text:focus{border-color:var(--accent2)}
  #draft-actions{display:flex;gap:8px;margin-top:8px}
  #btn-approve{flex:1;background:var(--green);color:#fff;border:none;padding:11px;border-radius:10px;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;transition:.15s}
  #btn-approve:hover{background:#16a34a}
  #btn-approve:disabled{opacity:.5;cursor:not-allowed}
  #btn-skip{background:var(--bubble-in);color:var(--text2);border:1px solid var(--border);padding:11px 16px;border-radius:10px;font-size:13px;font-family:inherit;cursor:pointer}
  #no-draft{color:var(--text2);font-size:12px;padding:10px 0;text-align:center}

  #empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);gap:8px}
  #empty-state span{font-size:36px}
  #toast{position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;display:none;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.3)}

  /* new message flash */
  @keyframes flash{0%{background:#1e1830}50%{background:#2d1044}100%{background:#1e1830}}
  .conv-item.flash{animation:flash .6s ease}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div>
      <h1>🌸 MY FOTO Inbox</h1>
      <p>หยก · V1 · Approve Mode</p>
    </div>
    <div id="status-dot" title="Connecting..."></div>
  </div>
  <div id="conv-list"><div id="no-convs">กำลังเชื่อมต่อ...</div></div>
</div>

<div id="main">
  <div id="empty-state">
    <span>💬</span>
    <p>เลือกลูกค้าจากด้านซ้าย</p>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '/api/inbox';
let convs = [];
let activeUserId = null;
let activeConv = null;
let es = null;

function timeStr(ts) {
  return new Date(ts).toLocaleTimeString('th', {hour:'2-digit',minute:'2-digit'});
}
function cleanDraft(t) {
  return (t||'').replace(/^\*{1,3}\s*/gm,'').replace(/\*{1,3}$/gm,'').trim();
}
function showToast(msg, color='#22c55e') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 2500);
}

// ── SSE realtime connection ──
function connectSSE() {
  if (es) es.close();
  es = new EventSource(`${API}?action=stream`);
  const dot = document.getElementById('status-dot');

  es.onopen = () => {
    dot.className = 'live';
    dot.title = 'เชื่อมต่อแล้ว (Realtime)';
  };

  es.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'inbox') {
        const prevIds = new Set(convs.map(c=>c.userId));
        convs = msg.data;
        renderSidebar(prevIds);
      }
      if (msg.type === 'conv' && msg.data.userId === activeUserId) {
        const oldMsgCount = activeConv?.messages?.length || 0;
        activeConv = msg.data;
        renderMain();
        if (msg.data.messages.length > oldMsgCount) {
          showToast('💬 ข้อความใหม่!', '#ff6b9d');
        }
      }
    } catch(err) {}
  };

  es.onerror = () => {
    dot.className = '';
    dot.title = 'ขาดการเชื่อมต่อ กำลังเชื่อมใหม่...';
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

// ── sidebar ──
function renderSidebar(prevIds) {
  const el = document.getElementById('conv-list');
  if (!convs.length) {
    el.innerHTML = '<div id="no-convs">ยังไม่มีข้อความค่า<br><small>รอลูกค้าทักใน LINE OA</small></div>';
    return;
  }
  el.innerHTML = convs.map(c => {
    const isNew = prevIds && !prevIds.has(c.userId);
    const preview = c.pendingDraft
      ? cleanDraft(c.pendingDraft).substring(0,40)
      : (c.messages.slice(-1)[0]?.text||'').substring(0,40);
    const avatarHtml = c.pictureUrl ? `<img src="${c.pictureUrl}" alt="">` : '👤';
    return `<div class="conv-item${c.userId===activeUserId?' active':''}${isNew?' flash':''}" onclick="openConv('${c.userId}')">
      <div class="conv-avatar">${avatarHtml}</div>
      <div class="conv-info">
        <div class="conv-name">${c.displayName||'ลูกค้า'}</div>
        <div class="conv-preview">${preview}</div>
      </div>
      ${c.status==='PENDING' ? '<div class="conv-badge">รอ</div>' : ''}
    </div>`;
  }).join('');
}

// ── open conversation ──
async function openConv(userId) {
  activeUserId = userId;
  const r = await fetch(`${API}?action=getConv&userId=${encodeURIComponent(userId)}`);
  activeConv = await r.json();
  renderSidebar();
  renderMain();
}

function renderMain() {
  const c = activeConv;
  if (!c) return;

  // LINE OA deep link — opens chat in LINE app
  const lineUrl = `https://manager.line.biz/account/@873ijssm/chat/${c.userId}`;
  const avatarHtml = c.pictureUrl ? `<img src="${c.pictureUrl}" alt="">` : '👤';
  const draft = cleanDraft(c.pendingDraft || '');

  document.getElementById('main').innerHTML = `
    <div id="chat-header">
      <div class="avatar">${avatarHtml}</div>
      <div class="info">
        <div class="name">${c.displayName||'ลูกค้า'}</div>
        <div class="uid">${c.userId}</div>
      </div>
      <a id="btn-line-oa" href="${lineUrl}" target="_blank">💬 LINE OA</a>
    </div>
    <div id="chat-body">
      ${c.messages.map(m=>`
        <div class="msg-row ${m.role}">
          <div>
            <div class="msg-bubble">${m.text}</div>
            <div class="msg-time">${timeStr(m.timestamp)}</div>
          </div>
        </div>`).join('')}
    </div>
    <div id="draft-area">
      ${draft ? `
        <div id="draft-label">
          🤖 AI หยก ร่างไว้
          <div id="draft-tabs">
            <button class="tab-btn" onclick="setLen('short',event)">สั้น</button>
            <button class="tab-btn active" onclick="setLen('mid',event)">กลาง</button>
            <button class="tab-btn" onclick="setLen('long',event)">ยาว</button>
          </div>
        </div>
        <textarea id="draft-text" rows="3">${draft}</textarea>
        <div id="draft-actions">
          <button id="btn-approve" onclick="doApprove()">✅ Approve & ส่ง</button>
          <button id="btn-skip" onclick="doSkip()">ข้าม</button>
        </div>
      ` : `<div id="no-draft">✅ ตอบแล้ว หรือยังไม่มี draft</div>`}
    </div>`;

  document.getElementById('chat-body').scrollTop = 999999;
  window._rawDraft = c.pendingDraft || '';
}

function setLen(len, ev) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  ev.target.classList.add('active');
  const raw = window._rawDraft || '';
  const s = raw.match(/SHORT[：:]([\s\S]*?)(?=MEDIUM[：:]|LONG[：:]|$)/i);
  const m = raw.match(/MEDIUM[：:]([\s\S]*?)(?=SHORT[：:]|LONG[：:]|$)/i);
  const l = raw.match(/LONG[：:]([\s\S]*?)(?=SHORT[：:]|MEDIUM[：:]|$)/i);
  let text = cleanDraft(raw);
  if (len==='short' && s) text = cleanDraft(s[1]);
  else if (len==='mid' && m) text = cleanDraft(m[1]);
  else if (len==='long' && l) text = cleanDraft(l[1]);
  const el = document.getElementById('draft-text');
  if (el) el.value = text;
}

async function doApprove() {
  const text = document.getElementById('draft-text')?.value?.trim();
  if (!text || !activeUserId) return;
  document.getElementById('btn-approve').disabled = true;
  const r = await fetch(`${API}?action=approve`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ userId: activeUserId, text })
  });
  if (r.ok) showToast('✅ ส่งแล้วค่า!');
  else showToast('❌ ส่งไม่ได้', '#ef4444');
}

function doSkip() {
  document.getElementById('draft-area').innerHTML='<div id="no-draft">⏭ ข้ามแล้ว</div>';
}

// ── start ──
connectSSE();
</script>
</body>
</html>
