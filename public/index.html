<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>MY FOTO Inbox V1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans Thai',sans-serif;background:#1a1a2e;display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:230px;background:#1e1e30;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid #2a2a4a}
@media(max-width:600px){.sb{width:70px}}
.sb-hdr{padding:14px 12px;background:#16213e;border-bottom:1px solid #2a2a4a;flex-shrink:0}
.sb-title{font-size:13px;font-weight:600;color:white}
.sb-sub{font-size:10px;color:#8888aa;margin-top:2px}
@media(max-width:600px){.sb-title,.sb-sub{display:none}}
.ulist{flex:1;overflow-y:auto}
.ui{padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;border-bottom:1px solid #2a2a4a;transition:background .15s;position:relative}
.ui:hover{background:#2a2a4a}
.ui.on{background:#3a2a5a;border-left:3px solid #e07aa0}
.uav{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:2px solid #e07aa0;background:#2a1a3a}
.uinfo{flex:1;min-width:0}
@media(max-width:600px){.uinfo{display:none}}
.uname{font-size:12px;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ulast{font-size:10px;color:#8888aa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ubdg{background:#e07aa0;color:white;border-radius:10px;font-size:9px;font-weight:700;padding:1px 6px;flex-shrink:0}
@media(max-width:600px){.ubdg{position:absolute;top:6px;right:6px;min-width:16px;text-align:center}}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;background:#f5f0f8;min-width:0}
.ch-hdr{background:white;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0e0f0;flex-shrink:0}
.ch-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid #e07aa0;flex-shrink:0;background:#fde8f1}
.ch-name{font-size:14px;font-weight:600;color:#333}
.ch-sub{font-size:11px;color:#aaa}
.line-btn{margin-left:auto;background:#00b900;color:white;border:none;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
.line-btn:hover{opacity:.85}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.mrow{display:flex;gap:8px;align-items:flex-end}
.mrow.out{flex-direction:row-reverse}
.mav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:#fde8f1}
.bub{max-width:74%;padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.mrow.in .bub{background:white;color:#333;border-bottom-left-radius:3px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.mrow.out .bub{background:#e07aa0;color:white;border-bottom-right-radius:3px}
.mrow.out.sent .bub{background:#4caf82}
.mtime{font-size:10px;color:#bbb;margin-top:2px}
.mrow.in .mtime{padding-left:34px}
.mrow.out .mtime{padding-right:34px;text-align:right}
.ok-tag{font-size:9px;color:rgba(255,255,255,.7);text-align:right;margin-bottom:2px}

/* DRAFT PANEL */
.draft{background:white;border-top:1px solid #f0e0f0;flex-shrink:0}
.dr-top{padding:8px 12px 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ai-bdg{background:#f4e8ff;color:#7a3ab0;font-size:9px;padding:2px 7px;border-radius:8px;font-weight:600}
.dr-lbl{font-size:11px;font-weight:600;color:#e07aa0}
.lbns{display:flex;gap:4px;margin-left:auto}
.lbn{padding:4px 10px;border-radius:12px;border:1.5px solid #e07aa0;background:white;color:#e07aa0;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.lbn.on,.lbn:hover{background:#e07aa0;color:white}
.dtxt{width:100%;padding:8px 12px;font-size:13px;line-height:1.6;border:none;resize:none;font-family:inherit;color:#333;background:#fff8fb;min-height:70px;outline:none;border-top:1px dashed #f4a7c3;margin-top:8px}
.dbns{display:flex;border-top:1px solid #f0e0f0}
.dbn{flex:1;padding:12px 0;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.dbn:active{opacity:.7}
.dbn.ok{background:#4caf82;color:white}
.dbn.lo{background:#f0e8f4;color:#7a3570}
.dbn.sk{background:#f5f5f5;color:#aaa;flex:.5}

.no-sel{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#8888aa;font-size:14px}
.no-pending{padding:10px 16px;background:white;border-top:1px solid #f0e0f0;font-size:12px;color:#aaa;text-align:center}
</style>
</head>
<body>

<div class="sb">
  <div class="sb-hdr">
    <div class="sb-title">📸 MY FOTO Inbox</div>
    <div class="sb-sub">หยก · V1 · Approve Mode</div>
  </div>
  <div class="ulist" id="ulist">
    <div style="padding:20px;color:#8888aa;font-size:12px;text-align:center">กำลังโหลด...</div>
  </div>
</div>

<div class="chat" id="chat">
  <div class="no-sel">
    <div style="font-size:52px">🌸</div>
    <div>เลือกลูกค้าจากซ้ายค่า</div>
    <div style="font-size:12px;color:#555">ข้อความใหม่จะขึ้นอัตโนมัติทุก 30 วิ</div>
  </div>
</div>

<script>
const API = '/api/inbox';
const BOT_ID = '@873ijssm';
let users = {};
let activeId = null;
let curLen = 'medium';

function parseDrafts(raw) {
  if (!raw) return { short: '', medium: raw || '', long: raw || '' };
  const s = (raw.match(/SHORT[:\s]+([\s\S]*?)(?=MEDIUM[:\s]|$)/i)||[])[1]?.trim();
  const m = (raw.match(/MEDIUM[:\s]+([\s\S]*?)(?=LONG[:\s]|$)/i)||[])[1]?.trim();
  const l = (raw.match(/LONG[:\s]+([\s\S]*?)$/i)||[])[1]?.trim();
  return {
    short: s || raw,
    medium: m || raw,
    long: l || raw
  };
}

function fmtTime(ts) {
  try { return new Date(ts).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}); }
  catch { return ''; }
}

async function load() {
  try {
    const r = await fetch(API + '?action=getInbox&t=' + Date.now());
    const items = await r.json();

    items.forEach(item => {
      const uid = item.userId || ('anon_' + item.id);
      if (!users[uid]) {
        users[uid] = {
          id: uid,
          name: item.displayName || 'ลูกค้า',
          avatar: '👤',
          history: [],
          pending: null,
          unread: 0,
          lastTime: item.timestamp
        };
      }
      const u = users[uid];
      const exists = u.history.find(h => h.msgId === item.id);
      if (!exists) {
        u.history.push({ msgId: item.id, from: 'user', text: item.userMessage, time: fmtTime(item.timestamp) });
        if (item.aiDraft && item.status === 'PENDING') {
          u.pending = { msgId: item.id, drafts: parseDrafts(item.aiDraft) };
          u.unread++;
          u.lastTime = item.timestamp;
        }
      }
    });

    renderSidebar();
    if (activeId && users[activeId]) renderChat();
  } catch(e) { console.error(e); }
}

function renderSidebar() {
  const ul = document.getElementById('ulist');
  const list = Object.values(users).sort((a,b) => new Date(b.lastTime) - new Date(a.lastTime));
  if (!list.length) {
    ul.innerHTML = '<div style="padding:20px;color:#8888aa;font-size:12px;text-align:center">ยังไม่มีข้อความค่า<br>กด ↻ หรือรอสักครู่</div>';
    return;
  }
  ul.innerHTML = list.map(u => `
    <div class="ui ${activeId===u.id?'on':''}" onclick="sel('${u.id}')">
      <div class="uav">${u.avatar}</div>
      <div class="uinfo">
        <div class="uname">${u.name}</div>
        <div class="ulast">${u.pending ? '⏳ รอ approve' : (u.history[u.history.length-1]?.text||'')}</div>
      </div>
      ${u.unread > 0 ? `<span class="ubdg">${u.unread}</span>` : ''}
    </div>`).join('');
}

function sel(id) {
  activeId = id;
  if (users[id]) users[id].unread = 0;
  curLen = 'medium';
  renderSidebar();
  renderChat();
}

function renderChat() {
  const u = users[activeId];
  if (!u) return;
  const lineUrl = u.id.startsWith('anon')
    ? `https://manager.line.biz/account/${BOT_ID}/chat`
    : `https://manager.line.biz/account/${BOT_ID}/chat/${u.id}`;

  const chat = document.getElementById('chat');
  chat.innerHTML = `
    <div class="ch-hdr">
      <div class="ch-av">${u.avatar}</div>
      <div>
        <div class="ch-name">${u.name}</div>
        <div class="ch-sub">${u.id.startsWith('anon') ? '⚠️ ไม่มี UserID' : u.id.substring(0,20)+'...'}</div>
      </div>
      <a class="line-btn" href="${lineUrl}" target="_blank">💬 เปิดใน LINE OA</a>
    </div>
    <div class="msgs" id="msgs">
      ${u.history.map(m => `
        <div class="mrow ${m.from==='yok' ? 'out'+(m.sent?' sent':'') : 'in'}">
          ${m.from==='user' ? `<div class="mav">${u.avatar}</div>` : ''}
          <div>
            ${m.sent ? '<div class="ok-tag">✅ ส่งแล้วค่า</div>' : ''}
            <div class="bub">${m.text}</div>
            <div class="mtime">${m.time}</div>
          </div>
        </div>`).join('')}
    </div>
    ${u.pending ? `
    <div class="draft">
      <div class="dr-top">
        <span class="ai-bdg">AI หยก</span>
        <span class="dr-lbl">ร่างไว้ — แก้ได้เลยค่า</span>
        <div class="lbns">
          <button class="lbn ${curLen==='short'?'on':''}" onclick="setLen('short')">สั้น</button>
          <button class="lbn ${curLen==='medium'?'on':''}" onclick="setLen('medium')">กลาง</button>
          <button class="lbn ${curLen==='long'?'on':''}" onclick="setLen('long')">ยาว</button>
        </div>
      </div>
      <textarea class="dtxt" id="dtxt">${u.pending.drafts[curLen]}</textarea>
      <div class="dbns">
        <button class="dbn ok" onclick="doApprove()">✅ Approve & ส่ง</button>
        <button class="dbn lo" onclick="window.open('${lineUrl}','_blank')">💬 LINE OA</button>
        <button class="dbn sk" onclick="doSkip()">✗</button>
      </div>
    </div>`
    : `<div class="no-pending">
        ไม่มีข้อความรอ approve ·
        <a href="${lineUrl}" target="_blank" style="color:#00b900;font-weight:600">เปิดใน LINE OA เพื่อพิมเอง →</a>
      </div>`}`;

  document.getElementById('msgs').scrollTop = 99999;
}

function setLen(len) {
  curLen = len;
  const u = users[activeId];
  if (u?.pending) {
    const el = document.getElementById('dtxt');
    if (el) el.value = u.pending.drafts[len];
  }
  document.querySelectorAll('.lbn').forEach(b => {
    b.classList.toggle('on',
      (b.textContent==='สั้น'&&len==='short') ||
      (b.textContent==='กลาง'&&len==='medium') ||
      (b.textContent==='ยาว'&&len==='long')
    );
  });
}

async function doApprove() {
  const u = users[activeId];
  if (!u?.pending) return;
  const msg = document.getElementById('dtxt')?.value?.trim();
  if (!msg) return alert('ข้อความว่างค่า');
  const now = fmtTime(new Date().toISOString());
  try {
    await fetch(`${API}?action=approve&id=${u.pending.msgId}&userId=${encodeURIComponent(u.id)}&message=${encodeURIComponent(msg)}`);
    u.history.push({ from: 'yok', text: msg, time: now, sent: true });
    u.pending = null;
    renderSidebar();
    renderChat();
  } catch(e) { alert('เกิดข้อผิดพลาด ลองใหม่นะคะ'); }
}

async function doSkip() {
  const u = users[activeId];
  if (!u?.pending) return;
  fetch(`${API}?action=skip&id=${u.pending.msgId}`).catch(()=>{});
  u.pending = null;
  renderSidebar();
  renderChat();
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
